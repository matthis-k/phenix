name: Finalize Phenix identity

on:
  push:
    branches:
      - rename/phenix-identity-audit

permissions:
  contents: write

jobs:
  rename:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: rename/phenix-identity-audit
          fetch-depth: 0
      - name: Rewrite root identity and Pi documentation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          for path in Path('docs').rglob('*.md'):
              if path.name == 'opencode.md':
                  continue
              text = path.read_text()
              text = text.replace('permalink: newxos/', 'permalink: phenix/')
              text = text.replace('OpenCode and Pi', 'Pi')
              text = text.replace('OpenCode', 'Pi')
              text = text.replace('opencode', 'pi')
              text = text.replace('`newxos`', 'the legacy monolith')
              text = text.replace('NewXOS', 'legacy system')
              text = text.replace('newxos', 'legacy monolith')
              path.write_text(text)

          Path('docs/opencode.md').unlink()

          Path('docs/pi.md').write_text('''---
          title: pi
          type: note
          permalink: phenix/pi
          ---

          # Phenix Pi workflow

          Pi is the supported coding-agent runtime for Phenix. Its package, extensions,
          routing policy, permissions, contracts, and session behavior are owned by
          `phenix-agent-harness`.

          ## Entry points

          On a configured workstation:

          ```console
          phenix ai
          ```

          This enters the root Phenix repository and starts the wrapped Pi runtime.
          The Pi package can also be invoked directly from the host development environment.

          ## Responsibility split

          - Pi performs model interaction and session management.
          - Tend plans and executes deterministic repository verification.
          - Stitch owns cross-repository graph and Git coordination.
          - Nix owns package, runtime dependency, and configuration assembly.
          - TypeScript owns routing, state transitions, output verification, and permissions.

          Provider identifiers such as `opencode-go` may remain in routing configuration when
          they identify a model backend consumed by Pi. They do not imply use of the retired
          OpenCode agent application.

          ## Configuration rules

          - Keep runtime configuration in `phenix-agent-harness`, not the root repository.
          - Prefer XDG configuration, state, and cache paths.
          - Do not create a second agent wrapper in the root flake.
          - Keep deterministic validation out of prompts.
          - Run the owning repository's Tend profile before updating the root lock.
          ''')

          Path('docs/README.md').write_text('''---
          title: README
          type: note
          permalink: phenix/readme
          ---

          # Phenix development documentation

          Phenix is a multi-repository NixOS composition workspace with explicit ownership,
          locked aggregate revisions, and deterministic verification.

          ## Reading order

          1. `guardrails.md`
          2. `architecture/flake-topology.md`
          3. `pi.md`
          4. `stitch.md`
          5. `tend.md`
          6. `testing.md`
          7. `migration.md`
          8. the root `ROADMAP.md`

          ## Repository model

          - The root `phenix` flake is the integration surface.
          - `phenix-hosts` owns concrete machines and system policy.
          - `phenix-de` owns the graphical desktop and Phenix Shell.
          - `phenix-nvim` owns the Neovim wrapper.
          - `phenix-agent-harness` owns Pi.
          - `phenix-packages` owns shared development packages.
          - `phenix-pins` owns shared upstream revisions.
          - Tend owns checks; Stitch owns cross-repository coordination.

          ## Verification

          ```console
          tend check --profile git-hook --context local
          tend check --profile pre-push --context local
          tend check --profile manual --context local
          tend check --profile ci --context ci --base <base> --head <head>
          ```

          Each feature repository must pass its own gate before the root lock is updated.
          The root gate then validates the exact aggregate graph.

          ## Agent workflow

          Use Pi through `phenix ai` or the wrapped package from `phenix-agent-harness`.
          Use Tend for deterministic checks and Stitch for workspace graph and Git actions.
          Agent prompts must not replace typed runtime contracts or repository verification.
          ''')

          Path('docs/codebase-memory.md').write_text('''---
          title: codebase-memory
          type: note
          permalink: phenix/codebase-memory
          ---

          # Codebase memory

          A codebase-memory MCP service may be attached to the Pi runtime to provide a cheap
          structural overview before expensive file-by-file exploration.

          It is most useful for architecture discovery, dependency analysis, impact analysis,
          structural search, and identifying ownership boundaries. Direct file reading remains
          preferable for small, local changes.

          Planners and architects should use codebase memory for broad changes. Verifiers should
          use it when checking dependency direction, public API drift, circular coupling risk, or
          whether a final diff remained within the accepted scope.
          ''')

          Path('AGENTS.md').write_text('''# Phenix workspace

          This repository is the root Phenix integration superflake. It aggregates locked
          subflakes and exposes the composed packages, applications, modules, and concrete
          NixOS configurations. Feature implementation belongs in the owning repository.

          ## Repository ownership

          - `phenix-de` owns desktop packages and NixOS/Home Manager desktop configuration.
          - `phenix-hosts` owns concrete systems, hardware, storage, users, secrets, networking,
            and host-specific services.
          - `phenix-nvim` owns the configured Neovim package.
          - `phenix-agent-harness` owns the Pi coding-agent runtime and configuration.
          - `phenix-packages` owns shared development packages and Home Manager modules.
          - `phenix-tend` owns deterministic verification.
          - `phenix-stitch` owns the repository graph and coordinated Git actions.
          - `phenix-pins` owns shared upstream revisions.

          Change the owning repository, validate it there, merge it, then update the root lock.

          ## Aggregate contract

          The root `flake.lock` is the authoritative aggregate revision set. Shared child inputs
          must follow the corresponding root inputs.

          A valid root revision must:

          - point only to child revisions that passed local CI,
          - pass strict Stitch lock-derived graph verification,
          - pass the root Tend `ci` profile,
          - pass complete `nix flake check`,
          - evaluate both concrete NixOS configurations,
          - contain no temporary migration workflows or generated diagnostics.

          The concrete systems are:

          - `nixosConfigurations.matthisk-laptop-phenix`
          - `nixosConfigurations.matthisk-desktop-phenix`

          ## Workspace model

          Phenix does not use Git submodules or committed gitlinks. Locked mode derives the graph
          from flake inputs and `flake.lock`. Mutable worktrees are optional local Stitch state.

          The conventional workspace is `${PHENIX_WORKSPACE:-$HOME/phenix}/repos`.

          ## Verification

          Use Tend profiles instead of ad hoc scripts:

          ```text
          tend check --profile git-hook --context local
          tend check --profile pre-push --context local
          tend check --profile manual --context local
          tend check --profile ci --context ci --base <base> --head <head>
          ```

          Use Stitch for graph and coordinated repository operations:

          ```text
          stitch graph verify --workspace . --source locks --strict
          stitch hooks plan --all
          stitch hooks install --all
          ```

          ## Agent runtime

          Pi is the only supported coding-agent application. Provider identifiers in routing
          configuration are backend names consumed by Pi, not alternative agent runtimes.

          Keep routing, state transitions, output verification, and permissions in TypeScript or
          Nix rather than relying on prompt-only enforcement.

          ## Safety

          Encrypted SOPS payloads may be committed. Plaintext secrets and host age identities may
          not be read, logged, or committed unless explicitly required and approved.

          Commit, push, merge, destructive Git actions, secret/auth changes, and permission
          weakening remain explicit actions. Never bypass a failed check to update an input.
          ''')

          Path('ROADMAP.md').write_text('''# Phenix roadmap

          ## Current status

          Phenix has a complete configuration baseline for the laptop and desktop. The root flake
          aggregates locked Phenix repositories and re-exports both concrete NixOS configurations.

          Evaluation and CI parity are established. Real-hardware activation, rollback, and
          behavioral acceptance remain before the legacy monolith can be archived.

          ## Completed baseline

          ### Desktop

          - [x] Hyprland Lua configuration and keymap engine
          - [x] Phenix Shell source, package, service, launcher, and IPC naming
          - [x] Kitty, Fish, Starship, Stylix/Catppuccin, and Zen Browser configuration
          - [x] Wayland screenshot, annotation, clipboard, and OCR utilities
          - [x] Reusable NixOS and Home Manager desktop modules

          ### Hosts

          - [x] `matthisk-laptop-phenix` NixOS configuration
          - [x] `matthisk-desktop-phenix` NixOS configuration
          - [x] Hardware, boot, resume, encrypted storage, and Disko layouts
          - [x] Home Manager, user, SSH, GitHub, SOPS, locale, audio, and sudo policy
          - [x] Bluetooth, NetworkManager, Avahi, LocalSend, and NordVPN
          - [x] Desktop Ollama, Open WebUI, Caddy, and Kokoro TTS
          - [x] Neovim and Pi installation through their owning flakes
          - [x] `phenix ai`, `phenix switch`, and `phenix reload-shell` workstation commands

          ### Aggregate

          - [x] Root input graph follows validated repository revisions
          - [x] Strict Stitch graph verification
          - [x] Tend v2 contracts and permanent CI
          - [x] Complete module and concrete-host re-exports
          - [x] Phenix-native names across active repositories

          ## Required before hardware cutover

          - [ ] Provision or confirm each host's SOPS age identity outside the repository
          - [ ] Build and activate the laptop configuration
          - [ ] Build and activate the desktop configuration
          - [ ] Verify boot, encrypted storage, resume, graphics, display manager, and rollback
          - [ ] Verify NordVPN login, dedicated-IP autoconnect, LAN discovery, and LocalSend
          - [ ] Verify Phenix Shell startup, launcher, notifications, clipboard, screenshots, and OCR
          - [ ] Verify desktop Ollama, Open WebUI, Caddy certificate trust, and Kokoro TTS
          - [ ] Confirm SSH and GitHub secret ownership and modes

          ## Remaining functional gaps

          - [ ] Installer media and first-install workflow
          - [ ] Complete Phenix Shell runtime/IPC launcher case harness in CI
          - [ ] Explicit behavioral parity tests for the wrapped Neovim configuration
          - [ ] Decide whether any legacy CLI or memory workflow remains useful beyond Stitch,
                Tend, Pi, and the new `phenix` workstation command

          Archive the legacy monolith only after both machines have activated successfully and the
          rollback path has been exercised.
          ''')

          gitignore = Path('.gitignore')
          lines = [line for line in gitignore.read_text().splitlines() if line not in {'.opencodestate/', 'opencode.json'}]
          gitignore.write_text('\n'.join(lines) + '\n')
          PY
      - name: Commit rename
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "docs: finalize Phenix and Pi identity"
          git push origin HEAD:rename/phenix-identity-audit
