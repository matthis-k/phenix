name: Update host evaluation fix

on:
  push:
    branches:
      - fix/host-evaluation-regression

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: fix/host-evaluation-regression
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Extend aggregate host gate
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('.tend.json')
          data = json.loads(path.read_text())
          task_id = 'nixos-toplevel-eval'
          for profile in ('pre-push', 'manual', 'ci'):
              tasks = data['profiles'][profile]['tasks']
              if task_id not in tasks:
                  tasks.append(task_id)

          tasks = data['node']['tasks']
          if not any(task['id'] == task_id for task in tasks):
              task = {
                  'id': task_id,
                  'description': 'Force both aggregate NixOS toplevel derivations without Home Manager package-set warnings',
                  'phase': 'verify',
                  'always': True,
                  'implementations': {
                      'local': {
                          'kind': 'command',
                          'command': [
                              'bash',
                              '-c',
                              'set -euo pipefail; for host in matthisk-laptop-phenix matthisk-desktop-phenix; do log="$(mktemp)"; if ! nix eval --raw ".#nixosConfigurations.${host}.config.system.build.toplevel.drvPath" >/dev/null 2>"$log"; then cat "$log"; exit 1; fi; cat "$log"; if grep -Fq "home-manager.useGlobalPkgs" "$log"; then echo "Home Manager global package-set warning returned for $host" >&2; exit 1; fi; rm -f "$log"; done'
                          ],
                          'network': True,
                          'sandbox_safe': False
                      }
                  }
              }
              insert_at = next((i for i, existing in enumerate(tasks) if existing['id'] == 'nixfmt-fix'), len(tasks))
              tasks.insert(insert_at, task)

          path.write_text(json.dumps(data, indent=2) + '\n')
          PY
          nix flake update phenix-hosts --accept-flake-config
      - name: Commit generated files through GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: fix/host-evaluation-regression
        run: |
          for path in .tend.json flake.lock; do
            current_sha="$(gh api "repos/$GITHUB_REPOSITORY/contents/$path?ref=$BRANCH" --jq .sha)"
            content="$(base64 -w0 "$path")"
            gh api --method PUT "repos/$GITHUB_REPOSITORY/contents/$path" \
              -f message="chore: update aggregate host evaluation gate" \
              -f content="$content" \
              -f sha="$current_sha" \
              -f branch="$BRANCH"
          done
