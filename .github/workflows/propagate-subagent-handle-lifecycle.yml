name: Propagate subagent handle lifecycle

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: propagate-subagent-handle-lifecycle-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  propagate:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'chore/propagate-subagent-handle-lifecycle'
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: chore/propagate-subagent-handle-lifecycle
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = auto
      - uses: cachix/cachix-action@v17
        with: { name: devenv }
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Update propagated inputs
        run: |
          nix flake update phenix-agent-harness phenix-hosts
          metadata="$(nix flake metadata --json)"
          test "$(jq -r '.locks.nodes["phenix-agent-harness"].locked.rev' <<<"$metadata")" = "b143d2f351cd8942f2d5b5123c6013c6d91fe4f6"
          test "$(jq -r '.locks.nodes["phenix-hosts"].locked.rev' <<<"$metadata")" = "bd2b441df96c0d6b2cb408fab8a27c94828263b2"
          rm .github/workflows/propagate-subagent-handle-lifecycle.yml
      - name: Run repository maintenance
        run: devenv test
      - name: Commit clean propagation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "chore(inputs): propagate subagent handle lifecycle"
          git push origin HEAD:chore/propagate-subagent-handle-lifecycle
