name: Run queued maintenance
on: { pull_request: {} }
permissions: { contents: write }
jobs:
  run:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v5
        with: { ref: main, fetch-depth: 0 }
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Execute queued maintenance script
        run: |
          set -uo pipefail
          rm -f .maintenance-failure.log
          repos=(phenix-pins phenix-packages phenix-stitch phenix-nvim phenix-de phenix-agent-harness phenix-hosts)
          for attempt in $(seq 1 120); do
            pending=()
            for repo in "${repos[@]}"; do
              flake="$(curl -fsSL "https://raw.githubusercontent.com/matthis-k/$repo/main/flake.nix" || true)"
              if [[ -z "$flake" || "$flake" == *phenix-tend* || "$flake" != *devenv* ]]; then pending+=("$repo"); fi
            done
            if (( ${#pending[@]} == 0 )); then break; fi
            if (( attempt == 120 )); then printf 'provider migrations did not converge: %s\n' "${pending[*]}" | tee .maintenance-failure.log; exit 1; fi
            echo "waiting for: ${pending[*]}"
            sleep 30
          done
          awk '/^        run: \|$/{capture=1; buf=""; next} capture {line=$0; sub(/^          /,"",line); buf=buf line ORS} END{printf "%s",buf}' .github/workflows/migrate-caretaker.yml > /tmp/migrate.sh
          sed -i '/^nix flake update$/i git add -A' /tmp/migrate.sh
          set +e
          bash /tmp/migrate.sh 2>&1 | tee /tmp/maintenance.log
          status=${PIPESTATUS[0]}
          set -e
          if (( status != 0 )); then
            git reset --hard HEAD
            git clean -fdx
            tail -n 500 /tmp/maintenance.log > .maintenance-failure.log
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add .maintenance-failure.log
            git commit -m "ci: capture root caretaker migration failure"
            git push origin main
            exit "$status"
          fi
      - name: Remove maintenance trigger
        run: |
          set -euo pipefail
          rm -f .github/workflows/run-maintenance.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A && git commit -m "chore: remove temporary maintenance trigger" && git push origin main
