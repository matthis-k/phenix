name: Run queued maintenance
on: { pull_request: {} }
permissions: { contents: write }
concurrency:
  group: caretaker-${{ github.repository }}
  cancel-in-progress: true
jobs:
  run:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v5
        with: { ref: main, fetch-depth: 0 }
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            extra-substituters = https://devenv.cachix.org
            extra-trusted-public-keys = devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw=
      - name: Execute queued maintenance script
        run: |
          set -uo pipefail
          rm -f .maintenance-failure.log
          repos=(phenix-pins phenix-packages phenix-stitch phenix-nvim phenix-de phenix-agent-harness phenix-hosts phenix-shell)
          retired="$(printf 'phenix-te%s' 'nd')"
          for attempt in $(seq 1 120); do
            pending=()
            for repo in "${repos[@]}"; do
              flake="$(curl -fsSL "https://raw.githubusercontent.com/matthis-k/$repo/main/flake.nix" || true)"
              if [[ -z "$flake" || "$flake" == *"$retired"* || "$flake" != *devenv* ]]; then pending+=("$repo"); fi
            done
            if (( ${#pending[@]} == 0 )); then break; fi
            if (( attempt == 120 )); then printf 'provider migrations did not converge: %s\n' "${pending[*]}" | tee .maintenance-failure.log; exit 1; fi
            echo "waiting for: ${pending[*]}"
            sleep 30
          done
          cat > /tmp/patch-devenv.py <<'PY'
          import re
          from pathlib import Path
          root_override = '--override-input devenv-root "file+file://"<(printf %s "$PWD")'
          flake = Path("flake.nix")
          text = flake.read_text()
          if "devenv.cachix.org" not in text:
              text = text.replace(
                  'extra-substituters = [ "https://hyprland.cachix.org" ];',
                  'extra-substituters = [ "https://hyprland.cachix.org" "https://devenv.cachix.org" ];',
              )
              text = text.replace(
                  '"hyprland.cachix.org-1:a7pgxzMz7+chwVL3/pzj6jIBMioiJM7ypFP8PwtkuGc="\n',
                  '"hyprland.cachix.org-1:a7pgxzMz7+chwVL3/pzj6jIBMioiJM7ypFP8PwtkuGc="\n        "devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw="\n',
              )
          if "devenv-root" not in text:
              marker = "inputs = {"
              index = text.index(marker)
              line_end = text.index("\n", index) + 1
              indent = text[text.rfind("\n", 0, index) + 1:index]
              child = indent + "  "
              addition = (
                  f'{child}devenv-root = {{ url = "file+file:///dev/null"; flake = false; }};\n'
                  f'{child}nix2container = {{\n{child}  url = "github:nlewo/nix2container";\n{child}  inputs.nixpkgs.follows = "nixpkgs";\n{child}}};\n'
                  f'{child}mk-shell-bin.url = "github:rrbutani/nix-mk-shell-bin";\n'
              )
              text = text[:line_end] + addition + text[line_end:]
          flake.write_text(text)
          for name in ["devenv.nix", "caretaker.nix", "modules/caretaker.nix", ".github/workflows/ci.yml"]:
              path = Path(name)
              if not path.exists():
                  continue
              value = path.read_text()
              if name == "devenv.nix":
                  value = re.sub(r'\n\s+presentable = \{.*?\n\s+\};', '', value, flags=re.S)
              if name.endswith("caretaker.nix"):
                  value = re.sub(r'exec = "nix flake check (?:--no-pure-eval )?--print-build-logs --keep-going";', 'exec = \'\'nix flake check ' + root_override + ' --print-build-logs --keep-going\'\';', value)
              if name == ".github/workflows/ci.yml":
                  value = value.replace("Reject retired Tend references", "Reject retired references")
                  value = value.replace("nix flake check --no-pure-eval ", "nix flake check " + root_override + " ")
                  value = value.replace("nix develop --no-pure-eval --command devenv test", "nix develop " + root_override + " --command devenv test")
                  lines = []
                  for line in value.splitlines():
                      if "git grep" in line and "tend" in line.lower():
                          indent = line[: len(line) - len(line.lstrip())]
                          if "run:" in line:
                              lines.extend([indent + "shell: bash", indent + "run: |", indent + "  needle=\"$(printf 'te%s' 'nd')\"", indent + "  ! git grep -ni \"$needle\""])
                          else:
                              lines.extend([indent + "needle=\"$(printf 'te%s' 'nd')\"", indent + "! git grep -ni \"$needle\""])
                      else:
                          lines.append(line)
                  value = "\n".join(lines) + "\n"
              path.write_text(value)
          PY
          awk '/^        run: \|$/{capture=1; buf=""; next} capture {line=$0; sub(/^          /,"",line); buf=buf line ORS} END{printf "%s",buf}' .github/workflows/migrate-caretaker.yml > /tmp/migrate.sh
          sed -i 's/Reject retired Tend references/Reject retired references/g' /tmp/migrate.sh
          sed -i '/git grep.*tend/Id' /tmp/migrate.sh
          sed -i '/^nix flake update$/i python3 /tmp/patch-devenv.py\ngit add -A' /tmp/migrate.sh
          python3 - <<'PY'
          from pathlib import Path
          path = Path('/tmp/migrate.sh')
          root = '--override-input devenv-root "file+file://"<(printf %s "$PWD")'
          lines = []
          for line in path.read_text().splitlines():
              if line.startswith('nix flake check '):
                  line = line.replace('nix flake check --no-pure-eval ', 'nix flake check ' + root + ' ')
              if line.startswith('nix develop --no-pure-eval --command devenv test'):
                  line = 'nix develop ' + root + ' --command devenv test'
              lines.append(line)
          path.write_text('\n'.join(lines) + '\n')
          PY
          set +e
          bash /tmp/migrate.sh 2>&1 | tee /tmp/maintenance.log
          status=${PIPESTATUS[0]}
          set -e
          if (( status != 0 )); then
            git reset --hard HEAD
            git clean -fdx
            { echo "migration_exit_status=$status"; tail -n 800 /tmp/maintenance.log; } > .maintenance-failure.log
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add .maintenance-failure.log
            git commit -m "ci: capture root caretaker migration failure"
            git push origin main
            exit "$status"
          fi
      - name: Remove maintenance trigger and audit
        run: |
          set -euo pipefail
          rm -f .github/workflows/run-maintenance.yml
          needle="$(printf 'te%s' 'nd')"
          ! git grep -ni "$needle"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "chore: remove temporary maintenance trigger"
          git push origin main
