name: Refresh virtual model boundary lock

on:
  push:
    branches: [chore/propagate-virtual-model-boundary]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: chore/propagate-virtual-model-boundary
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Refresh harness lock
        run: |
          nix flake lock --update-input phenix-agent-harness
          test "$(nix eval --raw --expr '(builtins.fromJSON (builtins.readFile ./flake.lock)).nodes."phenix-agent-harness".locked.rev')" = "02db7f0decc1794b49ab11e55fb702e6c9854687"
      - name: Commit generated lock
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock
          git diff --cached --quiet && exit 0
          git commit -m "chore: update virtual model boundary lock"
          git push
