name: Normalize root maintenance PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  normalize:
    if: github.event.pull_request.head.ref == 'refactor/standalone-root-maintenance'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refactor/standalone-root-maintenance
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with: { name: devenv }
      - run: nix profile add nixpkgs#devenv
      - name: Wait for normalized provider branches
        shell: bash
        run: |
          set -euo pipefail
          raw_file() {
            local repository="$1"
            local path="$2"
            local ref="$3"
            gh api \
              -H 'Accept: application/vnd.github.raw+json' \
              "repos/$repository/contents/$path?ref=$ref" \
              2>/dev/null || true
          }

          for attempt in $(seq 1 150); do
            stitch_flake="$(raw_file matthis-k/phenix-stitch flake.nix 'refactor%2Fscoped-stitch-maintenance')"
            tools_flake="$(raw_file matthis-k/phenix-tools flake.nix 'refactor%2Fthin-tools-maintenance')"
            tools_lock="$(raw_file matthis-k/phenix-tools flake.lock 'refactor%2Fthin-tools-maintenance')"
            harness_lock="$(raw_file matthis-k/phenix-agent-harness flake.lock 'refactor%2Fstandalone-devenv-maintenance')"
            hosts_lock="$(raw_file matthis-k/phenix-hosts flake.lock 'refactor%2Fstandalone-devenv-maintenance')"

            if [[ "$stitch_flake" == *'Dependency-aware ordered execution'* ]] \
              && [[ "$stitch_flake" != *'phenix-tend'* ]] \
              && [[ "$tools_flake" == *'Thin aggregation of Phenix command-line tools'* ]] \
              && [[ "$tools_lock" != *'phenix-tend'* ]] \
              && [[ "$harness_lock" != *'phenix-tend'* ]] \
              && [[ "$hosts_lock" != *'phenix-tend'* ]] \
              && [[ -n "$tools_lock" && -n "$harness_lock" && -n "$hosts_lock" ]]; then
              exit 0
            fi
            sleep 10
          done
          echo 'Provider branches did not become ready' >&2
          exit 1
      - name: Normalize and validate root
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/normalize-root-pr.yml

          set +e
          devenv tasks run maintenance:fix > normalize.log 2>&1
          fix_status=$?
          if (( fix_status == 0 )); then
            nix flake lock --accept-flake-config > lock.log 2>&1
            lock_status=$?
          else
            lock_status=1
          fi
          if (( fix_status == 0 && lock_status == 0 )); then
            devenv test > test.log 2>&1
            test_status=$?
          else
            test_status=1
          fi
          tail -n 260 normalize.log
          [[ -f lock.log ]] && tail -n 200 lock.log
          [[ -f test.log ]] && tail -n 500 test.log
          if (( fix_status != 0 || lock_status != 0 || test_status != 0 )); then
            exit 1
          fi

          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet || git commit -m "refactor: normalize root aggregation"
          git push origin HEAD:refactor/standalone-root-maintenance
      - name: Upload root diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: root-normalize-log
          path: |
            normalize.log
            lock.log
            test.log
          if-no-files-found: warn
