name: Update validated aggregate lock

on:
  push:
    branches:
      - sync/validated-aggregate-state

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: sync/validated-aggregate-state
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Update aggregate graph
        run: nix flake update --accept-flake-config
      - name: Commit generated lock through GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: sync/validated-aggregate-state
        run: |
          current_sha="$(gh api "repos/$GITHUB_REPOSITORY/contents/flake.lock?ref=$BRANCH" --jq .sha)"
          content="$(base64 -w0 flake.lock)"
          gh api --method PUT "repos/$GITHUB_REPOSITORY/contents/flake.lock" \
            -f message='chore: update validated aggregate lock graph' \
            -f content="$content" \
            -f sha="$current_sha" \
            -f branch="$BRANCH"
