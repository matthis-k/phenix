name: Audit Phenix identity

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - rename/phenix-identity-audit

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out audit repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Clone proposed aggregate repositories
        run: |
          set -euo pipefail
          mkdir repos
          git clone --depth=1 --branch rename/phenix-identity-audit \
            https://github.com/matthis-k/phenix.git repos/phenix
          for repo in \
            phenix-hosts \
            phenix-de \
            phenix-nvim \
            phenix-agent-harness \
            phenix-packages \
            phenix-pins \
            phenix-tend \
            phenix-stitch
          do
            if [ "$repo" = phenix-hosts ]; then
              git clone --depth=1 --branch cleanup/den-flake-structure "https://github.com/matthis-k/$repo.git" "repos/$repo"
            else
              git clone --depth=1 "https://github.com/matthis-k/$repo.git" "repos/$repo"
            fi
          done
      - name: Reject predecessor and retired shell names
        run: |
          set -euo pipefail
          : > identity-violations.txt

          while IFS= read -r path; do
            case "$path" in
              */.git/*|*/.github/workflows/*) continue ;;
            esac
            printf 'legacy path: %s\n' "$path" >> identity-violations.txt
          done < <(
            find repos -path '*/.git' -prune -o \
              \( -iname '*newxos*' -o -iname '*newshell*' \) -print
          )

          grep -RInEi \
            --exclude='flake.lock' \
            --exclude-dir='.git' \
            --exclude-dir='.github' \
            'newxos|newshell' repos >> identity-violations.txt || true

          for repo in repos/*; do
            [ "${repo##*/}" = phenix-agent-harness ] && continue
            grep -RInEi \
              --exclude='flake.lock' \
              --exclude-dir='.git' \
              --exclude-dir='.github' \
              'opencode' "$repo" >> identity-violations.txt || true
          done

          if [ -s identity-violations.txt ]; then
            cat identity-violations.txt
            exit 1
          fi

          echo "All active repositories use Phenix names; provider identifiers remain isolated to the Pi harness."
