name: Update root lock graph

on:
  push:
    branches:
      - sync/root-after-hosts-de-nvim

permissions:
  contents: write

jobs:
  update-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = auto

      - name: Update all inputs
        run: nix flake update --accept-flake-config

      - name: Commit updated lock graph
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync root input graph"
            git push
          fi

      - name: Run root Tend gate
        id: validate
        continue-on-error: true
        run: |
          base_sha="$(git merge-base HEAD origin/main)"
          head_sha="$(git rev-parse HEAD)"
          nix develop --accept-flake-config --command tend check \
            --profile ci \
            --context ci \
            --base "$base_sha" \
            --head "$head_sha" \
            > validation.log 2>&1

      - name: Commit validation output
        run: |
          git add validation.log
          if ! git diff --cached --quiet; then
            git commit -m "chore: capture root validation"
            git push
          fi

      - name: Enforce validation result
        if: steps.validate.outcome != 'success'
        run: exit 1
