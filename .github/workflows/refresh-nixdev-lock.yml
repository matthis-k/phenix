name: Refresh nixdev provider lock

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    if: github.event.pull_request.head.ref == 'feat/nixdev-app'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/nixdev-app
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Refresh phenix-tools
        run: |
          set -euo pipefail
          nix flake update phenix-tools --accept-flake-config
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock
          git diff --cached --quiet || git commit -m "chore: repin nixdev provider"
          git push origin HEAD:feat/nixdev-app
