name: Find renamed font

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - rename/phenix-identity-audit

permissions:
  contents: read

jobs:
  locate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out root branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: rename/phenix-identity-audit
      - name: Clone proposed aggregate repositories
        run: |
          set -euo pipefail
          mkdir repos
          cp -a . repos/phenix
          rm -rf repos/phenix/repos
          for repo in phenix-de phenix-nvim phenix-agent-harness phenix-packages phenix-pins phenix-tend phenix-stitch; do
            git clone --depth=1 "https://github.com/matthis-k/$repo.git" "repos/$repo"
          done
          git clone --depth=1 --branch cleanup/den-flake-structure \
            https://github.com/matthis-k/phenix-hosts.git repos/phenix-hosts
      - name: Locate stale package reference
        run: |
          set -euo pipefail
          grep -RIn --exclude-dir=.git --exclude=flake.lock \
            'noto-fonts-emoji\|noto-fonts-color-emoji' repos | tee font-reference.txt || true
      - name: Upload result
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097 # v4.4.2
        with:
          name: renamed-font-audit
          path: font-reference.txt
          if-no-files-found: error
