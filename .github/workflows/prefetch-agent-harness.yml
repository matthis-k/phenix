name: Propagate agent harness lock

on:
  push:
    branches: [chore/propagate-opencode-provider-resilience]

permissions:
  contents: write

jobs:
  propagate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: chore/propagate-opencode-provider-resilience
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Update and verify lock
        run: |
          nix flake update phenix-agent-harness
          jq -e '.nodes["phenix-agent-harness"].locked.rev == "f88407f0ce389ec0040e921aa1fe6f6c3eaa4813"' flake.lock
          rm .github/workflows/prefetch-agent-harness.yml
      - name: Commit final propagation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock .github/workflows/prefetch-agent-harness.yml
          git commit -m 'chore: update agent harness lock'
          git push
