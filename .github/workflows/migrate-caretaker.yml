name: Migrate root caretaker

on:
  push:
    branches: [main]
    paths: [.github/workflows/migrate-caretaker.yml]

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Wait for provider migrations
        shell: bash
        run: |
          set -euo pipefail
          repos=(phenix-pins phenix-packages phenix-stitch phenix-nvim phenix-de phenix-agent-harness phenix-hosts)
          for attempt in $(seq 1 90); do
            pending=()
            for repo in "${repos[@]}"; do
              flake="$(curl -fsSL "https://raw.githubusercontent.com/matthis-k/$repo/main/flake.nix" || true)"
              if [[ -z "$flake" || "$flake" == *phenix-tend* || "$flake" != *devenv* ]]; then
                pending+=("$repo")
              fi
            done
            if (( ${#pending[@]} == 0 )); then
              exit 0
            fi
            echo "waiting for: ${pending[*]}"
            sleep 30
          done
          echo "provider migrations did not converge" >&2
          exit 1
      - name: Replace Tend with modular devenv tasks
        shell: bash
        run: |
          set -euo pipefail
          rm -f .tend.json

          cat > flake.nix <<'EOF'
          {
            description = "Phenix workspace superflake aggregating all subflakes";

            nixConfig = {
              extra-substituters = [ "https://hyprland.cachix.org" ];
              extra-trusted-public-keys = [
                "hyprland.cachix.org-1:a7pgxzMz7+chwVL3/pzj6jIBMioiJM7ypFP8PwtkuGc="
              ];
            };

            inputs = {
              flake-parts = {
                url = "github:hercules-ci/flake-parts";
                inputs.nixpkgs-lib.follows = "nixpkgs";
              };
              phenix-pins = {
                url = "github:matthis-k/phenix-pins";
                inputs.flake-parts.follows = "flake-parts";
              };
              nixpkgs.follows = "phenix-pins/nixpkgs";
              devenv = {
                url = "github:cachix/devenv";
                inputs.nixpkgs.follows = "nixpkgs";
              };
              treefmt-nix = {
                url = "github:numtide/treefmt-nix";
                inputs.nixpkgs.follows = "nixpkgs";
              };
              git-hooks = {
                url = "github:cachix/git-hooks.nix";
                inputs.nixpkgs.follows = "nixpkgs";
              };
              disko = {
                url = "github:nix-community/disko";
                inputs.nixpkgs.follows = "nixpkgs";
              };
              phenix-packages = {
                url = "github:matthis-k/phenix-packages";
                inputs = {
                  phenix-pins.follows = "phenix-pins";
                  flake-parts.follows = "flake-parts";
                  nixpkgs.follows = "nixpkgs";
                  devenv.follows = "devenv";
                  treefmt-nix.follows = "treefmt-nix";
                  git-hooks.follows = "git-hooks";
                };
              };
              phenix-stitch = {
                url = "github:matthis-k/phenix-stitch";
                inputs = {
                  phenix-pins.follows = "phenix-pins";
                  flake-parts.follows = "flake-parts";
                  nixpkgs.follows = "nixpkgs";
                  devenv.follows = "devenv";
                  treefmt-nix.follows = "treefmt-nix";
                  git-hooks.follows = "git-hooks";
                };
              };
              phenix-nvim = {
                url = "github:matthis-k/phenix-nvim";
                inputs = {
                  phenix-pins.follows = "phenix-pins";
                  flake-parts.follows = "flake-parts";
                  nixpkgs.follows = "nixpkgs";
                  devenv.follows = "devenv";
                  treefmt-nix.follows = "treefmt-nix";
                  git-hooks.follows = "git-hooks";
                };
              };
              phenix-de = {
                url = "github:matthis-k/phenix-de";
                inputs = {
                  phenix-pins.follows = "phenix-pins";
                  flake-parts.follows = "flake-parts";
                  nixpkgs.follows = "nixpkgs";
                  home-manager.follows = "phenix-pins/home-manager";
                  devenv.follows = "devenv";
                  treefmt-nix.follows = "treefmt-nix";
                  git-hooks.follows = "git-hooks";
                };
              };
              phenix-agent-harness = {
                url = "github:matthis-k/phenix-agent-harness";
                inputs = {
                  phenix-pins.follows = "phenix-pins";
                  phenix-stitch.follows = "phenix-stitch";
                  nixpkgs.follows = "nixpkgs";
                  devenv.follows = "devenv";
                  treefmt-nix.follows = "treefmt-nix";
                  git-hooks.follows = "git-hooks";
                };
              };
              phenix-hosts = {
                url = "github:matthis-k/phenix-hosts";
                inputs = {
                  phenix-pins.follows = "phenix-pins";
                  flake-parts.follows = "flake-parts";
                  nixpkgs.follows = "nixpkgs";
                  home-manager.follows = "phenix-pins/home-manager";
                  sops-nix.follows = "phenix-pins/sops-nix";
                  disko.follows = "disko";
                  phenix-de.follows = "phenix-de";
                  phenix-nvim.follows = "phenix-nvim";
                  phenix-agent-harness.follows = "phenix-agent-harness";
                  devenv.follows = "devenv";
                  treefmt-nix.follows = "treefmt-nix";
                  git-hooks.follows = "git-hooks";
                };
              };
            };

            outputs = inputs@{ flake-parts, ... }:
              flake-parts.lib.mkFlake { inherit inputs; } {
                systems = [ "x86_64-linux" "aarch64-linux" ];
                imports = [
                  inputs.devenv.flakeModule
                  ./phenix-module.nix
                  ./phenix-wrappers.nix
                  ./phenix-re-exports.nix
                  ./phenix-helpers.nix
                  inputs.phenix-packages.flakeModules.default
                  inputs.phenix-de.flakeModules.default
                  inputs.phenix-nvim.flakeModules.default
                  inputs.phenix-stitch.flakeModules.default
                  inputs.phenix-agent-harness.flakeModules.default
                ];

                perSystem = { system, pkgs, ... }:
                  let
                    stitchPkg = inputs.phenix-stitch.packages.${system}.stitch;
                    piPkg = inputs.phenix-agent-harness.packages.${system}.pi;
                  in {
                    phenix.stitchPkg = stitchPkg;
                    packages.pi = piPkg;
                    apps = {
                      stitch = inputs.phenix-stitch.apps.${system}.stitch;
                      phenix-shell = inputs.phenix-de.apps.${system}.phenix-shell;
                      default = inputs.phenix-stitch.apps.${system}.stitch;
                    };
                    devenv.shells.default = {
                      imports = [ ./devenv.nix ];
                      packages = with pkgs; [
                        git gh jq ripgrep fd statix deadnix nixfmt stylua
                        kdePackages.qtdeclarative piPkg stitchPkg
                      ];
                    };
                  };
              };
          }
          EOF

          cat > phenix-helpers.nix <<'EOF'
          { lib, ... }:
          let inherit (lib) types;
          in {
            perSystem = { config, pkgs, ... }: {
              options.phenix = {
                helperPackages = lib.mkOption {
                  type = types.listOf types.package;
                  default = [];
                  description = "Common packages for Phenix development shells";
                };
                stitchPkg = lib.mkOption {
                  type = types.nullOr types.package;
                  default = null;
                  description = "Stitch package used by workspace helpers";
                };
                shellHook = lib.mkOption {
                  type = types.lines;
                  default = "";
                  description = "Common Phenix development-shell initialization";
                };
              };
              config.phenix = {
                helperPackages = with pkgs; [ git nix jq ripgrep fd statix deadnix nixfmt ];
                shellHook = let stitch = config.phenix.stitchPkg; in ''
                  repo-check() { devenv test "$@"; }
                  repo-fix() { devenv tasks run fix "$@"; }
                  workspace-check() {
                    ${lib.optionalString (stitch != null) "${stitch}/bin/stitch"} exec --all --order providers-first -- nix develop --no-pure-eval --command devenv test "$@"
                  }
                  workspace-fix() {
                    ${lib.optionalString (stitch != null) "${stitch}/bin/stitch"} exec --all --order providers-first --apply -- nix develop --no-pure-eval --command devenv tasks run fix "$@"
                  }
                  export -f repo-check repo-fix workspace-check workspace-fix 2>/dev/null || true
                  echo "Phenix development shell"
                  echo "  repo-check      -> devenv test"
                  echo "  repo-fix        -> devenv tasks run fix"
                  echo "  workspace-check -> ordered per-repository devenv test"
                  echo "  workspace-fix   -> ordered per-repository caretaker chores"
                '';
              };
            };
          }
          EOF

          cat > devenv.nix <<'EOF'
          { lib, ... }:
          let
            caretakerModules = builtins.filter
              (path: builtins.baseNameOf path == "caretaker.nix")
              (lib.filesystem.listFilesRecursive ./.);
          in {
            imports = caretakerModules;
            treefmt = {
              enable = true;
              config.programs = {
                nixfmt.enable = true;
                stylua.enable = true;
              };
            };
            git-hooks.hooks = {
              treefmt.enable = true;
              statix.enable = true;
              deadnix.enable = true;
              presentable = {
                enable = true;
                entry = "devenv test";
                pass_filenames = false;
                always_run = true;
                stages = [ "pre-push" ];
              };
            };
            enterShell = ''
              echo "  check: devenv test"
              echo "  fix:   devenv tasks run fix"
            '';
          }
          EOF

          cat > caretaker.nix <<'EOF'
          { ... }: {
            tasks = {
              "check:format" = { exec = "treefmt --fail-on-change"; before = [ "devenv:enterTest" ]; };
              "check:statix" = { exec = "statix check --ignore .git/**"; before = [ "devenv:enterTest" ]; };
              "check:deadnix" = { exec = "deadnix --fail --no-lambda-arg --no-lambda-pattern-names"; before = [ "devenv:enterTest" ]; };
              "check:json" = {
                exec = ''find . -path ./.git -prune -o -name '*.json' -type f -print0 | xargs -0 -r -n1 jq -e . >/dev/null'';
                before = [ "devenv:enterTest" ];
              };
              "check:docs" = {
                exec = ''
                  missing=0
                  for file in ROADMAP.md docs/workflow/git-jj-policy.md docs/workflow/workspace-state.md AGENTS.md flake.nix flake.lock devenv.nix .stitch.json; do
                    [[ -f "$file" ]] || { echo "MISSING: $file"; missing=1; }
                  done
                  exit "$missing"
                '';
                before = [ "devenv:enterTest" ];
              };
              "check:graph" = { exec = "stitch graph verify . --strict"; before = [ "devenv:enterTest" ]; };
              "check:flake" = { exec = "nix flake check --accept-flake-config --print-build-logs --keep-going"; before = [ "devenv:enterTest" ]; };
              "check:hosts" = {
                exec = ''
                  set -euo pipefail
                  for host in matthisk-laptop-phenix matthisk-desktop-phenix; do
                    log="$(mktemp)"
                    if ! nix eval --raw ".#nixosConfigurations.$host.config.system.build.toplevel.drvPath" >/dev/null 2>"$log"; then
                      cat "$log"
                      exit 1
                    fi
                    cat "$log"
                    if grep -Fq "home-manager.useGlobalPkgs" "$log"; then
                      echo "Home Manager global package-set warning returned for $host" >&2
                      exit 1
                    fi
                    rm -f "$log"
                  done
                '';
                before = [ "devenv:enterTest" ];
              };
              "fix:format".exec = "treefmt";
              "fix:statix".exec = "statix fix";
              "fix:deadnix".exec = "deadnix --edit --no-lambda-arg --no-lambda-pattern-names";
            };
          }
          EOF

          cat > .stitch.json <<'EOF'
          {
            "role": "root",
            "layer": 6,
            "dependencies": []
          }
          EOF

          cat > .github/workflows/ci.yml <<'EOF'
          name: CI
          on:
            pull_request:
            push:
              branches: [main]
          permissions:
            contents: read
          jobs:
            checks:
              runs-on: ubuntu-latest
              timeout-minutes: 120
              steps:
                - uses: actions/checkout@v5
                  with: { fetch-depth: 0 }
                - uses: cachix/install-nix-action@v31
                  with:
                    extra_nix_config: |
                      experimental-features = nix-command flakes
                      accept-flake-config = true
                - run: nix flake check --accept-flake-config --print-build-logs --keep-going
                - run: nix develop --no-pure-eval --command devenv test
                - name: Reject retired Tend references
                  run: '! git grep -n -i "\\btend\\b"'
          EOF

          rm -f .github/workflows/migrate-caretaker.yml
          nix flake update
          nix flake check --accept-flake-config --print-build-logs --keep-going
          nix develop --no-pure-eval --command devenv test
          ! git grep -n -i '\btend\b'

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor: replace Tend with modular devenv tasks"
          git push
