name: Update agent harness lock

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update-agent-harness-lock-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  update-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Update agent harness input
        run: nix flake update phenix-agent-harness
      - name: Commit generated lock
        run: |
          if git diff --quiet -- flake.lock; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock
          git commit -m "lock: update phenix-agent-harness"
          git push origin HEAD:${{ github.head_ref }}
