name: Generate agent harness lock

on:
  pull_request:
    paths:
      - .github/workflows/generate-agent-harness-lock.yml

permissions:
  contents: read

jobs:
  generate:
    name: Generate lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Update harness input
        run: nix flake update phenix-agent-harness
      - name: Upload generated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: generated-agent-harness-lock
          path: flake.lock
          if-no-files-found: error
