name: Refresh merged root lock

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    if: github.event.pull_request.head.ref == 'refactor/standalone-root-maintenance'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refactor/standalone-root-maintenance
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with: { name: devenv }
      - run: nix profile add nixpkgs#devenv
      - name: Refresh and validate merged graph
        shell: bash
        run: |
          set -euo pipefail
          devenv tasks run maintenance:fix
          nix flake lock --accept-flake-config
          devenv test
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock flake.nix maintenance.nix devenv.nix
          git diff --cached --quiet || git commit -m "refactor: repin merged Phenix graph"
          git push origin HEAD:refactor/standalone-root-maintenance
