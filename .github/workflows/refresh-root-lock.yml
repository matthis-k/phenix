name: Refresh merged root lock

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    if: github.event.pull_request.head.ref == 'refactor/standalone-root-maintenance'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refactor/standalone-root-maintenance
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with: { name: devenv }
      - run: nix profile add nixpkgs#devenv
      - name: Apply maintenance fixes
        shell: bash
        run: |
          set +e
          devenv tasks run maintenance:fix > fix.log 2>&1
          status=$?
          tail -n 300 fix.log
          exit "$status"
      - name: Refresh merged lock
        shell: bash
        run: |
          set +e
          nix flake lock --accept-flake-config > lock.log 2>&1
          status=$?
          tail -n 300 lock.log
          exit "$status"
      - name: Validate merged graph
        shell: bash
        run: |
          set +e
          devenv test > test.log 2>&1
          status=$?
          tail -n 600 test.log
          exit "$status"
      - name: Publish canonical lock
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock flake.nix maintenance.nix devenv.nix
          git diff --cached --quiet || git commit -m "refactor: repin merged Phenix graph"
          git push origin HEAD:refactor/standalone-root-maintenance
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: root-refresh-diagnostics
          path: |
            fix.log
            lock.log
            test.log
          if-no-files-found: warn
