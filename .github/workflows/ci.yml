name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flake-check:
    name: Root flake checks
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Checkout submodules
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule sync --recursive
          git submodule update --init --recursive --jobs 4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = auto

      - name: Show submodule pins
        run: git submodule status --recursive

      - name: Tend profile validation
        run: nix develop .#default --command tend validate --profiles

      - name: Tend root nix-check profile
        run: nix develop .#default --command tend check --profile nix-check --offline --locked

      - name: Stitch topology check
        run: nix develop .#default --command stitch topology check --workspace . --config .stitch/topology.json

      - name: Stitch changed-node dry run
        run: nix develop .#default --command stitch verify --changed --dry-run --json

      - name: Show flake metadata
        run: nix flake metadata --accept-flake-config

      - name: Evaluate flake checks
        run: nix flake check --accept-flake-config --no-build --show-trace

      - name: Run flake checks
        run: nix flake check --accept-flake-config --print-build-logs --show-trace
