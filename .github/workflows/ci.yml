name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Tend CI profile
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out feature branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = auto

      - name: Generate desktop route lock update
        run: |
          nix flake lock --accept-flake-config \
            --update-input phenix-de \
            --update-input phenix-hosts

      - name: Prepare generated commit
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/ci.yml flake.lock
          git commit -m "chore: propagate Phenix DE UX architecture"

      - name: Run read-only Tend CI profile
        shell: bash
        run: |
          nix develop --accept-flake-config --command tend check \
            --profile ci \
            --context ci \
            --base origin/main \
            --head HEAD

      - name: Push validated lock update
        if: github.event_name == 'pull_request'
        run: git push origin HEAD:${{ github.event.pull_request.head.ref }}
