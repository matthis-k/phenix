name: Finalize local workspace development

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.ref == 'feat/local-workspace-dev'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: feat/local-workspace-dev
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = auto
      - uses: cachix/cachix-action@v17
        with:
          name: devenv
      - run: nix profile add nixpkgs#devenv
      - name: Normalize and refresh merged graph
        run: |
          set -euo pipefail
          devenv tasks run maintenance:fix
          nix flake update --accept-flake-config
      - name: Validate local workspace integration
        run: devenv test
      - name: Publish canonical source and lock
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A -- . ':(exclude).github/workflows/**'
          git diff --cached --quiet || git commit -m "feat: finalize local workspace development"
          git push origin HEAD:feat/local-workspace-dev
