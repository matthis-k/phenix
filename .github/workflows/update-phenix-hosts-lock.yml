name: Update phenix-hosts lock

on:
  push:
    branches:
      - chore/update-phenix-hosts

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: chore/update-phenix-hosts
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Update lock and remove generator
        run: |
          nix flake lock --update-input phenix-hosts
          git rm .github/workflows/update-phenix-hosts-lock.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock
          git commit -m 'chore: update phenix-hosts input'
          git push
