name: Update phenix-hosts lock

on:
  push:
    branches:
      - chore/update-phenix-hosts-capabilities

permissions:
  contents: write

jobs:
  update-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
      - name: Update lock
        run: |
          nix flake lock --update-input phenix-hosts
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock
          git commit -m 'chore: update phenix-hosts' || exit 0
          git push
