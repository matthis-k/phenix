name: Propagate workflow deadlock fix

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: propagate-workflow-deadlock-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  propagate:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'chore/propagate-workflow-deadlock-fix'
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: chore/propagate-workflow-deadlock-fix
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = auto
      - uses: cachix/cachix-action@v17
        with: { name: devenv }
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Update propagated inputs
        run: |
          nix flake update phenix-agent-harness phenix-hosts
          harness="$(jq -r '.nodes["phenix-agent-harness"].locked.rev' flake.lock)"
          hosts="$(jq -r '.nodes["phenix-hosts"].locked.rev' flake.lock)"
          test "$harness" = "3991e009fb5641d2b18e63c86dd452d4b52af0c7"
          test "$hosts" = "aa70f5fcf33b11d404c9bee56956d1fbcdbcd1d3"
          rm .github/workflows/propagate-workflow-deadlock-fix.yml
      - name: Run repository maintenance
        run: devenv test
      - name: Commit clean propagation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "chore(inputs): propagate workflow deadlock fix"
          git push origin HEAD:chore/propagate-workflow-deadlock-fix
